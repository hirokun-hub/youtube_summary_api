# Docker Compose設定ファイル
# YouTube Summary APIをDocker Compose環境で常駐化
# Tailnetへの接続はホスト（Windows）側のTailscaleが担当
#
# 使用方法:
#   起動: docker compose up -d
#   停止: docker compose down
#   ログ確認: docker compose logs -f

services:
  # FastAPIコンテナ
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: youtube-api-fastapi
    ports:
      - "0.0.0.0:10000:10000"
    env_file:
      - path: ./.env
        required: true
      - path: ./.env.local
        required: false
    volumes:
      - ./data/usage:/app/data/usage
    restart: unless-stopped
