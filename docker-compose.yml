# Docker Compose設定ファイル
# YouTube Summary APIをDocker Compose環境で常駐化し、Tailnetネットワーク内で運用
# 
# 使用方法:
#   起動: docker compose up -d
#   停止: docker compose down
#   ログ確認: docker compose logs -f
#   Tailnet状態確認: docker compose exec tailscale tailscale status

services:
  # Tailscale sidecarコンテナ
  # 役割: tailscaledデーモンを実行し、Tailnetに参加
  # 要件: 2.1, 2.2, 2.3, 2.4, 2.14
  tailscale:
    build:
      context: .
      dockerfile: docker/Dockerfile.tailscale
    container_name: youtube-api-tailscale
    hostname: ${TAILSCALE_HOSTNAME:-youtube-api-dev}
    # Tailscaleがネットワークインターフェースを操作するために必要な権限
    # 要件: 2.2
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # TUNデバイスへのアクセス（Linux環境用、macOSではTS_USERSPACEで代替）
    devices:
      - /dev/net/tun:/dev/net/tun
    # 認証状態とソケットの永続化
    # 要件: 2.3
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-run:/var/run/tailscale
    # 環境変数（macOS/Docker Desktop対応でuserspaceモードを有効化）
    environment:
      - TS_USERSPACE=true
    # .envと.env.localの両方を読み込む
    # .env.localが存在しない場合は.envのみで動作（フォールバック）
    # 要件: 3.7, 3.8
    env_file:
      - path: ./.env
        required: true
      - path: ./.env.local
        required: false
    # ループバック限定でポート公開（localhost:10000でのヘルスチェック用）
    # 要件: 2.14
    ports:
      - "127.0.0.1:10000:10000"
    # Tailnet接続状態のヘルスチェック
    healthcheck:
      test: ["CMD", "tailscale", "--socket=/var/run/tailscale/tailscaled.sock", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    # コンテナ異常終了時に自動再起動
    # 要件: 1.5
    restart: unless-stopped

  # FastAPIコンテナ
  # 役割: FastAPIアプリケーションを実行
  # 要件: 1.1, 1.2, 1.3
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: youtube-api-fastapi
    # Tailscaleコンテナと同じネットワーク名前空間を共有
    # これにより、Tailnet IPへのinboundトラフィックが直接FastAPIに届く
    # 要件: 2.13
    network_mode: "service:tailscale"
    # Tailscale接続完了後にFastAPIを起動（healthcheck連携）
    # 要件: 2.12
    depends_on:
      tailscale:
        condition: service_healthy
    # .envと.env.localの両方を読み込む
    # 要件: 3.7, 3.9
    env_file:
      - path: ./.env
        required: true
      - path: ./.env.local
        required: false
    # コンテナ異常終了時に自動再起動
    # 要件: 1.5
    restart: unless-stopped
    # network_mode使用時はportsは無効化される（Tailscale側で公開）

# ボリューム定義
# 要件: 2.3
volumes:
  # Tailscaleの認証状態を永続化
  tailscale-state:
    driver: local
  # Tailscaleソケットを共有（コンテナ間通信用）
  tailscale-run:
    driver: local
